apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: todo-statefulset
  namespace: todo-app
spec:
  serviceName: "todo-db-service"
  replicas: 3
  selector:
    matchLabels:
      app: todo-db
  template:
    metadata:
      labels:
        app: todo-db
    spec:
      containers:
      - name: todo-db
        image: mongo:8.0
        command:
          - mongod
          - "--bind_ip_all"
          - "--replSet"
          - "rs0"
        ports:
        - containerPort: 27017
        resources:
          requests:
            memory: "256Mi"
            cpu: "500m"
          limits:
            memory: "512Mi"
            cpu: "1"
        volumeMounts:
        - name: mongo-persistent-storage
          mountPath: /data/db
  volumeClaimTemplates:
  - metadata:
      name: mongo-persistent-storage
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 1Gi